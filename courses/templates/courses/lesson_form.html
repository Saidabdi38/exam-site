{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:820px;">

  <h2>Add Lesson — {{ course.title }}</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label><strong>Chapter</strong></label>
    <select name="chapter" class="form-control">
      <option value="">-- No Chapter --</option>
      {% for ch in chapters %}
        <option value="{{ ch.id }}">
          {{ ch.title }}
        </option>
      {% endfor %}
    </select>
    <br>

    <!-- TITLE -->
    <label for="{{ form.title.id_for_label }}"><strong>Lesson Title</strong></label>
    {{ form.title }}

    <br>

    <!-- CONTENT -->
    <label for="{{ form.content.id_for_label }}"><strong>Content</strong></label>
    <div class="editor-wrap">
      {{ form.media }}
      {{ form.content }}
    </div>

    <br>

    <!-- PUBLISH -->
    <label style="display:flex;gap:8px;align-items:center;">
      {{ form.is_published }}
      Published
    </label>

    <!-- STUDENT VISIBILITY -->
    <label style="display:flex;gap:8px;align-items:center;margin-top:6px;">
      {{ form.allow_students_view }}
      Allow students to view this lesson
    </label>

    <br>

    <button class="btn btn-primary">Save Lesson</button>

    <a class="btn btn-secondary"
       href="{% url 'courses:course_dashboard' course.id %}">
      Cancel
    </a>
  </form>

</div>

<style>
/* normal django fields */
select,
input[type="text"],
textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  box-sizing: border-box;
}

/* checkboxes should stay small */
input[type="checkbox"] {
  width: auto;
  padding: 0;
  border: 0;
}

/* ckeditor full width */
.editor-wrap {
  width: 100%;
}

.editor-wrap .django-ckeditor-widget,
.editor-wrap .cke,
.editor-wrap .cke_chrome,
.editor-wrap .cke_inner,
.editor-wrap .cke_top,
.editor-wrap .cke_contents,
.editor-wrap .cke_bottom {
  width: 100% !important;
  box-sizing: border-box;
}

.editor-wrap .cke_contents {
  min-height: 320px;
}

/* spacing */
label {
  display: block;
  margin-bottom: 6px;
}
</style>

{% endblock %}
