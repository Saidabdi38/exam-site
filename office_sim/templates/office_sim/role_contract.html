{% extends "base.html" %}
{% block title %}Heshiiska Shaqada{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="card shadow-sm p-4 rounded-4">
    <h1>Heshiiska Shaqada</h1>
    <h3 class="mb-3">{{ role.name }}</h3>

    <div style="font-size:18px; line-height:1.9;">
      {% if role.contract_text_so %}
        {{ role.contract_text_so|linebreaks }}
      {% else %}
        <p>Heshiiska wali lama gelin.</p>
      {% endif %}
    </div>

    <form method="post" class="mt-4">
      {% csrf_token %}
      <input type="hidden" name="accepted" value="yes">
      <button class="btn btn-success btn-lg">Waan Aqbalay</button>
    </form>
  </div>
</div>
{% endblock %}
