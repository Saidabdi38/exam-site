{% extends "base.html" %}
{% block title %}Select Role{% endblock %}
{% block content %}
<h1>Select Your Role</h1>
{% for role in roles %}
  <div class="card" style="margin-bottom:12px;">
    <h3>{{ role.name }}</h3>
    <p>{{ role.description }}</p>
    <a class="btn btn-primary" href="{% url 'select_role' role.id %}">Choose Role</a>
  </div>
{% empty %}
  <p>No roles available.</p>
{% endfor %}
{% endblock %}
