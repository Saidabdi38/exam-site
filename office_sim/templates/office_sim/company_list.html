{% extends "base.html" %}
{% block title %}Dooro Shirkad{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="card shadow-sm p-4 rounded-4">
    <h1 class="mb-4">Dooro Shirkadda</h1>

    {% for company in companies %}
      <div class="card p-3 mb-3 rounded-4 shadow-sm">
        <h3>{{ company }}</h3>
        <a href="{% url 'office_company_transactions' company %}" class="btn btn-primary">
          Dooro
        </a>
      </div>
    {% empty %}
      <p>Wax shirkado ah lama helin.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
